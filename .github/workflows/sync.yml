name: Sync to Private Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # This fetches the full history so we can push it

      - name: Force Push to Private Mirror
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          # Add the private repository as a remote destination using your token
          git remote add private https://sibesh-ML:${SYNC_TOKEN}@github.com/sibesh-ML/thinkbox-web.git
          
          # Force push the code to make the private repo an exact 1:1 match
          git push -f private main
