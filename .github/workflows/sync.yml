name: Sync to thinkbox-web

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v3

      - name: Clone target repo
        run: |
          git clone https://github.com/sibesh-ML/thinkbox-web.git target

      - name: Sync files
        run: |
          rsync -av --delete --exclude='.git' ./ target/

      - name: Push changes
        run: |
          cd target
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync from thinkbox" || echo "No changes"
          git push https://x-access-token:${{ github.token }}@github.com/sibesh-ML/thinkbox-web.git
